schema_version: "0.1"

kind: claim

claims:
  - id: claim.jesus_created
    question_id: question.christology.created_being
    summary: >
      Jesus is a created being.
    proposition: >
      Jesus, the Son, belongs to the created order.
    scope:
      domain: christology

  - id: claim.jesus_uncreated
    question_id: question.christology.created_being
    summary: >
      Jesus is not a created being.
    proposition: >
      Jesus, the Son, does not belong to the created order.
    scope:
      domain: christology

  - id: claim.jesus_preeminent_in_relation_to_other_creatures
    question_id: question.christology.created_being
    summary: >
      Jesus is preeminent in relation to all other creatures.
    proposition: >
      Jesus has preeminent rank in relation to all other creatures, while still
      being understood as part of the created order.
    scope:
      domain: christology

  - id: claim.firstborn_can_indicate_preeminence
    question_id: question.christology.firstborn_preeminence
    summary: >
      Firstborn can indicate rank or preeminence rather than birth order.
    proposition: >
      The term firstborn is not limited to chronological birth order and can be
      used to indicate rank or preeminence.
    scope:
      domain: lexical_scripture_usage

  - id: claim.prototokos_usually_indicates_temporal_priority
    question_id: question.christology.firstborn_preeminence
    summary: >
      Prototokos usually indicates temporal priority in Scriptural usage.
    proposition: >
      The Greek term prototokos, commonly rendered firstborn, usually indicates
      being first in order of time unless the context gives reason otherwise.
    scope:
      domain: lexical_scripture_usage

  - id: claim.colossians_firstborn_not_decisive_created
    question_id: question.christology.created_being
    summary: >
      Colossians 1:15's use of firstborn does not by itself prove that Jesus is
      created.
    proposition: >
      The word firstborn in Colossians 1:15 is not sufficient by itself to
      establish that Jesus belongs to the created order.
    scope:
      domain: christology
