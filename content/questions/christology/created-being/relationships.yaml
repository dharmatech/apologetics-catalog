schema_version: "0.1"

kind: relationship

relationships:
  - id: relationship.created.contradicts_uncreated
    type: contradicts
    from_id: claim.jesus_created
    to_id: claim.jesus_uncreated
    summary: >
      In this question's scope, Jesus cannot both belong and not belong to the
      created order.

  - id: relationship.jw.colossians_firstborn.supports_created
    type: supports
    from_id: interpretation.jw.colossians.1_15.firstborn_created_order
    to_id: claim.jesus_created
    summary: >
      The created-order reading of firstborn is modeled as supporting the claim
      that Jesus is a created being.

  - id: relationship.nicene.colossians_firstborn.supports_uncreated
    type: supports
    from_id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    to_id: claim.jesus_uncreated
    summary: >
      The preeminence reading of firstborn is modeled as supporting the claim
      that Jesus is not a created being.

  - id: relationship.nicene.firstborn.challenges_created_reading
    type: challenges
    from_id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The preeminence reading challenges the created-order reading of firstborn.

  - id: relationship.trinitarian.psalms_89_firstborn.supports_preeminence
    type: supports
    from_id: interpretation.trinitarian.psalms.89_27.firstborn_rank
    to_id: claim.firstborn_can_indicate_preeminence
    summary: >
      The Psalm 89:27 rank reading supports the claim that firstborn can indicate
      rank or preeminence rather than birth order.

  - id: relationship.trinitarian.firstborn_preeminence.challenges_created_reading
    type: challenges
    from_id: claim.firstborn_can_indicate_preeminence
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      If firstborn can indicate rank or preeminence, then the word does not by
      itself require the created-order reading of Colossians 1:15.

  - id: relationship.trinitarian.firstborn_not_necessarily_created.uses_psalms_89
    type: uses
    from_id: argument.trinitarian.firstborn_not_necessarily_created
    to_id: interpretation.trinitarian.psalms.89_27.firstborn_rank
    summary: >
      The argument uses Psalm 89:27's rank reading as evidence that firstborn
      need not indicate chronological birth order.

  - id: relationship.trinitarian.firstborn_not_necessarily_created.uses_preeminence_claim
    type: uses
    from_id: argument.trinitarian.firstborn_not_necessarily_created
    to_id: claim.firstborn_can_indicate_preeminence
    summary: >
      The argument uses the broader lexical claim that firstborn can indicate
      rank or preeminence.

  - id: relationship.trinitarian.firstborn_not_necessarily_created.supports_limited_claim
    type: supports
    from_id: argument.trinitarian.firstborn_not_necessarily_created
    to_id: claim.colossians_firstborn_not_decisive_created
    summary: >
      The argument supports the limited claim that firstborn in Colossians 1:15
      does not, by itself, establish that Jesus is created.

  - id: relationship.trinitarian.firstborn_not_necessarily_created.challenges_jw_reading
    type: challenges
    from_id: argument.trinitarian.firstborn_not_necessarily_created
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The argument challenges the inference from firstborn of all creation to
      created status.

  - id: relationship.trinitarian.john_1_3.depends_on_word_identification
    type: depends_on
    from_id: interpretation.trinitarian.john_1_3.excludes_created_word
    to_id: interpretation.trinitarian.john_1_14.word_identified_with_jesus
    summary: >
      The John 1:3 argument depends on reading the Word in John's prologue as
      Jesus through John 1:14.

  - id: relationship.trinitarian.john_1_3.depends_on_created_being_assumption
    type: depends_on
    from_id: interpretation.trinitarian.john_1_3.excludes_created_word
    to_id: assumption.created_beings.came_into_existence
    summary: >
      The argument depends on treating created beings as beings that came into
      existence.

  - id: relationship.trinitarian.john_1_3.depends_on_all_things_scope
    type: depends_on
    from_id: interpretation.trinitarian.john_1_3.excludes_created_word
    to_id: assumption.trinitarian.john_1_3.all_things_scope
    summary: >
      The argument depends on taking John 1:3's all things language as covering
      the whole class of things that came into existence.

  - id: relationship.trinitarian.john_1_3_response.uses_interpretation
    type: uses
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: interpretation.trinitarian.john_1_3.excludes_created_word
    summary: >
      The response uses the Trinitarian reading of John 1:3 as excluding Jesus
      from the class of things that came into existence.

  - id: relationship.trinitarian.john_1_3_response.challenges_created_claim
    type: challenges
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: claim.jesus_created
    summary: >
      If Jesus is excluded from the class of things that came into existence,
      this challenges the claim that Jesus is a created being.

  - id: relationship.trinitarian.john_1_3_response.supports_uncreated_claim
    type: supports
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: claim.jesus_uncreated
    summary: >
      The John 1:3 argument supports the claim that Jesus is not a created
      being.

  - id: relationship.trinitarian.john_1_3_response.challenges_jw_created_reading
    type: challenges
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The argument challenges the Jehovah's Witnesses created-order reading of
      Colossians 1:15 by appealing to John 1:3 as a broader contextual
      constraint.

  - id: relationship.trinitarian.john_1_3_response.responds_to_no_basis_assertion
    type: responds_to
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: evidence.jw_study_bible.colossians.1_15.no_basis_other_meaning
    summary: >
      The argument responds to the Study Bible note's no-basis assertion by
      offering John 1:3 as a proposed contextual and theological basis for a
      non-created reading of firstborn in Colossians 1:15.

  - id: relationship.trinitarian.john_1_3_response.supports_limited_claim
    type: supports
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: claim.colossians_firstborn_not_decisive_created
    summary: >
      The argument supports the limited claim that firstborn in Colossians 1:15
      does not by itself establish that Jesus belongs to the created order.

  - id: relationship.trinitarian.john_1_3_response.supports_preeminence_reading
    type: supports
    from_id: argument.trinitarian.john_1_3_created_things_response
    to_id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    summary: >
      The argument supports the Nicene preeminence reading as a way to read
      Colossians 1:15 consistently with John 1:3.

  - id: relationship.jw.colossians_1_16_scope.depends_on_contextual_scope
    type: depends_on
    from_id: interpretation.jw.colossians_1_16.all_other_things_scope
    to_id: assumption.jw.all_things_language_can_be_contextually_scoped
    summary: >
      The Jehovah's Witnesses all-other-things interpretation depends on
      allowing all things language to be scoped by context.

  - id: relationship.jw.colossians_1_16_scope.challenges_trinitarian_scope
    type: challenges
    from_id: interpretation.jw.colossians_1_16.all_other_things_scope
    to_id: assumption.trinitarian.john_1_3.all_things_scope
    summary: >
      The NWT all-other-things reading challenges the Trinitarian assumption
      that all things language in this argument must include the whole class of
      things that came into existence.

  - id: relationship.jw.colossians_1_16_response.uses_scope_interpretation
    type: uses
    from_id: argument.jw.colossians_1_16_all_other_things_response
    to_id: interpretation.jw.colossians_1_16.all_other_things_scope
    summary: >
      The response uses the NWT Colossians 1:16 all-other-things interpretation
      as its main answer to the Trinitarian John 1:3 argument.

  - id: relationship.jw.colossians_1_16_response.responds_to_john_1_3_argument
    type: responds_to
    from_id: argument.jw.colossians_1_16_all_other_things_response
    to_id: argument.trinitarian.john_1_3_created_things_response
    summary: >
      The response answers the Trinitarian John 1:3 argument by proposing that
      all things language concerning Jesus can be understood as all other
      things.

  - id: relationship.jw.colossians_1_16_response.challenges_john_1_3_interpretation
    type: challenges
    from_id: argument.jw.colossians_1_16_all_other_things_response
    to_id: interpretation.trinitarian.john_1_3.excludes_created_word
    summary: >
      The response challenges the Trinitarian John 1:3 interpretation by
      disputing the scope of the all things language rather than the link
      between the Word and Jesus.

  - id: relationship.jw.colossians_1_16_scope.supports_created_reading
    type: supports
    from_id: interpretation.jw.colossians_1_16.all_other_things_scope
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The all-other-things reading supports the Jehovah's Witnesses
      created-order interpretation by distinguishing Jesus from the rest of the
      things created through him.

  - id: relationship.jw.colossians_1_16_response.challenges_preeminence_reading
    type: challenges
    from_id: argument.jw.colossians_1_16_all_other_things_response
    to_id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    summary: >
      The response challenges the Nicene preeminence reading by arguing that
      the immediate NWT Colossians context itself frames creation language as
      all other things.

  - id: relationship.jw.colossians_1_16_response.challenges_limited_claim
    type: challenges
    from_id: argument.jw.colossians_1_16_all_other_things_response
    to_id: claim.colossians_firstborn_not_decisive_created
    summary: >
      The response challenges the limited Trinitarian claim by arguing that the
      surrounding NWT Colossians context reinforces, rather than weakens, the
      created-order reading of firstborn.

  - id: relationship.jw.firstborn_usual_meaning_response.uses_study_note
    type: uses
    from_id: argument.jw.firstborn_usual_meaning_response
    to_id: evidence.jw_study_bible.colossians.1_15.no_basis_other_meaning
    summary: >
      The response uses the Study Bible note's assertion that Colossians 1:15
      gives no basis for firstborn to take a non-usual meaning.

  - id: relationship.jw.firstborn_usual_meaning_response.responds_to_trinitarian_argument
    type: responds_to
    from_id: argument.jw.firstborn_usual_meaning_response
    to_id: argument.trinitarian.firstborn_not_necessarily_created
    summary: >
      The response answers the Trinitarian argument that firstborn need not
      imply created status in Colossians 1:15.

  - id: relationship.jw.firstborn_usual_meaning_response.supports_created_reading
    type: supports
    from_id: argument.jw.firstborn_usual_meaning_response
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The response supports the Jehovah's Witnesses interpretation that
      firstborn of all creation places the Son within the created order.

  - id: relationship.jw.study_note_usual_meaning.supports_temporal_priority_claim
    type: supports
    from_id: evidence.jw_study_bible.colossians.1_15.usual_scriptural_meaning
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Study Bible note's usual-meaning statement supports the claim that
      prototokos usually indicates temporal priority in Scriptural usage.

  - id: relationship.jw.temporal_priority_claim.supports_usual_meaning_response
    type: supports
    from_id: claim.prototokos_usually_indicates_temporal_priority
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The general temporal-priority claim supports the Jehovah's Witnesses
      response that Colossians 1:15 should retain the usual meaning.

  - id: relationship.jw.first_creation_gloss.supports_created_reading
    type: supports
    from_id: evidence.jw_study_bible.colossians.1_15.first_creation_gloss
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The Study Bible note's first-creation gloss directly supports the
      Jehovah's Witnesses created-order interpretation of Colossians 1:15.

  - id: relationship.jw.preeminence_concession.supports_preeminent_creatures_claim
    type: supports
    from_id: evidence.jw_study_bible.colossians.1_15.preeminent_other_creatures
    to_id: claim.jesus_preeminent_in_relation_to_other_creatures
    summary: >
      The Study Bible note's concession supports the claim that Jesus is
      preeminent in relation to all other creatures.

  - id: relationship.jw.preeminent_creatures.qualifies_nicene_preeminence
    type: qualifies
    from_id: claim.jesus_preeminent_in_relation_to_other_creatures
    to_id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    summary: >
      The claim qualifies the Nicene preeminence reading by accepting
      preeminence while locating Jesus in relation to all other creatures.

  - id: relationship.jw.preeminent_creatures.supports_created_reading
    type: supports
    from_id: claim.jesus_preeminent_in_relation_to_other_creatures
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The claim supports the Jehovah's Witnesses created-order reading by
      treating Jesus' preeminence as compatible with creaturely status.

  - id: relationship.jw.colossians_1_18_firstborn.supports_temporal_priority_claim
    type: supports
    from_id: interpretation.jw.colossians.1_18.firstborn_from_dead_temporal
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Colossians 1:18 reading supports the claim that firstborn can carry an
      order-of-time sense in Scriptural usage.

  - id: relationship.jw.colossians_1_18_firstborn.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.colossians.1_18.firstborn_from_dead_temporal
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Colossians 1:18 reading provides near-context support for the
      Jehovah's Witnesses response that firstborn in Colossians 1:15 should
      retain its usual temporal meaning.

  - id: relationship.modeling.revelation_1_5.related_to_colossians_1_18
    type: related_to
    from_id: interpretation.modeling.revelation_1_5.firstborn_from_dead_parallel
    to_id: interpretation.jw.colossians.1_18.firstborn_from_dead_temporal
    summary: >
      Revelation 1:5 and Colossians 1:18 both apply firstborn from the dead
      language to Jesus, making Revelation 1:5 a close resurrection-context
      parallel to the Colossians 1:18 usage cited in the Study Bible note.

  - id: relationship.modeling.revelation_1_5.supports_temporal_priority_claim
    type: supports
    from_id: interpretation.modeling.revelation_1_5.firstborn_from_dead_parallel
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Revelation 1:5 resurrection-context usage supports the narrower claim
      that firstborn can mark order or priority within a concrete sequence.

  - id: relationship.modeling.revelation_1_5.supports_usual_meaning_response
    type: supports
    from_id: interpretation.modeling.revelation_1_5.firstborn_from_dead_parallel
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Revelation 1:5 parallel provides additional bounded support for the
      Jehovah's Witnesses response that firstborn in Colossians 1:15 should not
      be moved away from its usual temporal sense without contextual reason.

  - id: relationship.modeling.revelation_1_5.supports_jw_six_of_eight
    type: supports
    from_id: interpretation.modeling.revelation_1_5.firstborn_from_dead_parallel
    to_id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    summary: >
      The Revelation 1:5 observation supports the Study Bible note's
      occurrence-count appeal by identifying another Jesus-related G4416
      occurrence.

  - id: relationship.jw.revelation_3_14_beginning.supports_created
    type: supports
    from_id: interpretation.jw.revelation.3_14.beginning_created_by_god
    to_id: claim.jesus_created
    summary: >
      The Revelation 3:14 reading supports the claim that Jesus belongs to the
      created order.

  - id: relationship.jw.revelation_3_14_beginning.supports_colossians_created_reading
    type: supports
    from_id: interpretation.jw.revelation.3_14.beginning_created_by_god
    to_id: interpretation.jw.colossians.1_15.firstborn_created_order
    summary: >
      The Revelation 3:14 reading is modeled as confirming support for the
      Jehovah's Witnesses created-order reading of Colossians 1:15.

  - id: relationship.jw.revelation_3_14_beginning.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.revelation.3_14.beginning_created_by_god
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Revelation 3:14 reading supports the Jehovah's Witnesses response that
      Colossians 1:15 should be read as identifying Jesus with the created
      order.

  - id: relationship.jw.genesis_49_3_prototokos.supports_temporal_priority_claim
    type: supports
    from_id: interpretation.jw.genesis.49_3.prototokos_birth_order
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Genesis 49:3 LXX example supports the claim that prototokos can carry
      ordinary birth-order meaning in Scriptural usage.

  - id: relationship.jw.genesis_49_3_prototokos.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.genesis.49_3.prototokos_birth_order
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Genesis 49:3 LXX example provides lexical support for the
      Jehovah's Witnesses response that firstborn in Colossians 1:15 should
      retain its usual meaning.

  - id: relationship.jw.luke_2_7_prototokos.supports_temporal_priority_claim
    type: supports
    from_id: interpretation.jw.luke_2_7.prototokos_birth_order
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Luke 2:7 Greek example supports the claim that prototokos can carry
      ordinary birth-order meaning in Scriptural usage.

  - id: relationship.jw.luke_2_7_prototokos.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.luke_2_7.prototokos_birth_order
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Luke 2:7 example provides lexical support for the Jehovah's Witnesses
      response that firstborn in Colossians 1:15 should retain its usual
      meaning.

  - id: relationship.jw.luke_2_7_law_context.supports_temporal_priority_claim
    type: supports
    from_id: interpretation.jw.luke_2_7.firstborn_child_law_context
    to_id: claim.prototokos_usually_indicates_temporal_priority
    summary: >
      The Luke firstborn-child and temple-presentation context supports the
      claim that firstborn can carry ordinary birth-order meaning in Scriptural
      usage.

  - id: relationship.jw.luke_2_7_law_context.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.luke_2_7.firstborn_child_law_context
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Luke firstborn-child and temple-presentation context supports the
      Jehovah's Witnesses response that firstborn in Colossians 1:15 should
      retain its usual meaning.

  - id: relationship.jw.six_of_eight_prototokos.supports_usual_meaning_response
    type: supports
    from_id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    to_id: argument.jw.firstborn_usual_meaning_response
    summary: >
      The Study Bible note's occurrence-count claim provides cumulative support
      for the Jehovah's Witnesses response that firstborn in Colossians 1:15
      should retain its usual meaning.

  - id: relationship.modeling.romans_8_29.supports_jw_six_of_eight
    type: supports
    from_id: interpretation.modeling.romans_8_29.jesus_related_g4416_occurrence
    to_id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    summary: >
      The Romans 8:29 observation supports the Study Bible note's
      occurrence-count appeal by identifying another Jesus-related G4416
      occurrence.

  - id: relationship.methodology.bibleforge_g4416_count.qualifies_jw_six_of_eight
    type: qualifies
    from_id: interpretation.methodology.bibleforge.nt_g4416_count_source_sensitive
    to_id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    summary: >
      The BibleForgeDB count qualifies the Study Bible note's count-based
      argument by showing that New Testament prototokos occurrence counts depend
      on the textual source or database being counted.
