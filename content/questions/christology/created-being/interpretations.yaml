schema_version: "0.1"

kind: interpretation

interpretations:
  - id: interpretation.jw.colossians.1_15.firstborn_created_order
    evidence_id: evidence.nwt.colossians.1_15.firstborn
    method: lexical
    summary: >
      The phrase firstborn of all creation is read as placing the Son within
      the created order.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.official_christology_summary

  - id: interpretation.jw.colossians_1_16.all_other_things_scope
    evidence_id: evidence.nwt.colossians.1_16.all_other_things_created
    related_evidence_ids:
      - evidence.nwt.colossians.1_13_20.other_pattern
    method: translation_scope
    summary: >
      The NWT rendering of Colossians 1:16 is read as scoping the created
      things made through Jesus as all other things. On this reading, Jesus is
      excluded from the class of things created by means of him while remaining
      the agent through whom the rest of creation came into existence.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.bible.nwt

  - id: interpretation.trinitarian.nwt_1984_bracketed_other.supplied_english
    evidence_id: evidence.nwt_1984_reference.colossians.1_16.bracketed_other_footnote
    related_evidence_ids:
      - evidence.nwt_1984_reference.introduction.bracket_convention
      - evidence.nwt.colossians.1_16.all_other_things_created
    method: translation_history
    summary: >
      A Trinitarian reads the 1984 reference edition's bracketed "All [other]"
      footnote together with its bracket convention as evidence that other is a
      supplied English word used to complete the sense. On this reading, the
      later unbracketed NWT wording should not be treated as independent proof
      that Paul explicitly excluded Jesus from all things.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis using NWT 1984 reference materials"

  - id: interpretation.trinitarian.john_1_14.word_identified_with_jesus
    evidence_id: evidence.nwt.john.1_14.word_became_flesh
    method: contextual
    summary: >
      The Word who becomes flesh in John 1:14 is read as Jesus, making the
      prologue's statements about the Word relevant to claims about Jesus.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis"

  - id: interpretation.trinitarian.john_1_3.excludes_created_word
    evidence_id: evidence.nwt.john.1_3.all_things_through_him
    related_evidence_ids:
      - evidence.nwt.john.1_14.word_became_flesh
    method: contextual
    summary: >
      John 1:3 is read as dividing the Word from the whole class of things that
      came into existence through him. Since the Word is identified with Jesus,
      this reading excludes Jesus from the class of things that came into
      existence.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis using NWT John 1:3 and John 1:14"

  - id: interpretation.jw.colossians.1_18.firstborn_from_dead_temporal
    evidence_id: evidence.nwt.colossians.1_18.firstborn_from_dead
    method: contextual
    summary: >
      The phrase firstborn from the dead is read as using firstborn in an
      order-of-time sense, providing modest lexical and near-context support for
      a temporal reading of firstborn in Colossians.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.modeling.revelation_1_5.firstborn_from_dead_parallel
    evidence_id: evidence.nwt.revelation.1_5.firstborn_from_dead
    related_evidence_ids:
      - evidence.bibleforge.greek.revelation.1_5.prototokos
      - evidence.nwt.colossians.1_18.firstborn_from_dead
    method: contextual
    summary: >
      Revelation 1:5 uses firstborn from the dead for Jesus in a resurrection
      context parallel to Colossians 1:18. It is modeled as support for
      firstborn carrying order or priority within a concrete sequence, without
      deciding by itself how Colossians 1:15 should be read.
    provenance:
      work:
        title: "Dataset author synthesis"

  - id: interpretation.jw.revelation.3_14.beginning_created_by_god
    evidence_id: evidence.nwt.revelation.3_14.beginning_creation
    method: contextual
    summary: >
      The phrase beginning of the creation by God is read as identifying Jesus
      as the first created one, providing confirming support for the
      Jehovah's Witnesses created-order reading.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.genesis.49_3.prototokos_birth_order
    evidence_id: evidence.lxx.ccat.genesis.49_3.reuben_firstborn
    method: lexical
    summary: >
      Genesis 49:3 in the Septuagint applies prototokos language to Reuben as
      Jacob's firstborn, and is used as an example of ordinary birth-order
      usage.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.luke_2_7.prototokos_birth_order
    evidence_id: evidence.bibleforge.greek.prototokos.luke_2_7_colossians_1_15
    method: lexical
    summary: >
      Luke 2:7 uses a form of prototokos for Jesus as Mary's firstborn child,
      and is used as an example of ordinary birth-order usage of the term.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.luke_2_7.firstborn_child_law_context
    evidence_id: evidence.jw_study_bible.colossians.1_15.mary_firstborn_law
    related_evidence_ids:
      - evidence.nwt.luke.2_7.mary_firstborn_child
      - evidence.nwt.luke.2_23.firstborn_male_holy
    method: contextual
    summary: >
      Luke 2:7 and the temple-presentation context are read as a concrete
      firstborn-child usage, supporting the ordinary birth-order sense of
      firstborn in the Jehovah's Witnesses response.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    evidence_id: evidence.jw_study_bible.colossians.1_15.six_of_eight_jesus
    method: lexical_distribution
    summary: >
      The Study Bible note's count claim is used as cumulative support that
      Christian Greek Scripture usage of prototokos, especially in references
      to Jesus, favors retaining the usual temporal sense in Colossians 1:15.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.modeling.romans_8_29.jesus_related_g4416_occurrence
    evidence_id: evidence.bibleforge.greek.romans.8_29.prototokos
    related_evidence_ids:
      - evidence.nwt.romans.8_29.firstborn_many_brothers
    method: lexical_distribution
    summary: >
      Romans 8:29 is modeled as a Jesus-related G4416 occurrence relevant to
      the Study Bible note's distribution appeal, without deciding by itself
      what sense firstborn has in Colossians 1:15.
    provenance:
      work:
        title: "Dataset author synthesis"

  - id: interpretation.methodology.bibleforge.nt_g4416_count_source_sensitive
    evidence_id: evidence.bibleforge.greek.prototokos.nt_g4416_occurrences
    method: source_comparison
    summary: >
      BibleForgeDB returns nine New Testament rows tagged G4416, including
      Matthew 1:25, so occurrence-count arguments about prototokos should name
      the textual source or database being counted.
    provenance:
      work:
        title: "Dataset author synthesis"

  - id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    evidence_id: evidence.bsb.colossians.1_15.firstborn
    method: lexical
    summary: >
      The phrase firstborn over all creation is read as indicating rank or
      preeminence rather than created status.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        source_id: source.creed.nicene.trinitarian_summary

  - id: interpretation.trinitarian.psalms.89_27.firstborn_rank
    evidence_id: evidence.nwt.psalms.89_27.firstborn_highest
    method: contextual
    summary: >
      Psalm 89:27 applies firstborn language to the Davidic king in parallel
      with being highest of the kings of the earth, so firstborn is read here
      as rank or preeminence rather than mere birth order.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis"
