schema_version: "0.1"

kind: interpretation

interpretations:
  - id: interpretation.jw.colossians.1_15.firstborn_created_order
    evidence_id: evidence.nwt.colossians.1_15.firstborn
    method: lexical
    summary: >
      The phrase firstborn of all creation is read as placing the Son within
      the created order.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.official_christology_summary

  - id: interpretation.jw.colossians.1_18.firstborn_from_dead_temporal
    evidence_id: evidence.nwt.colossians.1_18.firstborn_from_dead
    method: contextual
    summary: >
      The phrase firstborn from the dead is read as using firstborn in an
      order-of-time sense, providing modest lexical and near-context support for
      a temporal reading of firstborn in Colossians.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.revelation.3_14.beginning_created_by_god
    evidence_id: evidence.nwt.revelation.3_14.beginning_creation
    method: contextual
    summary: >
      The phrase beginning of the creation by God is read as identifying Jesus
      as the first created one, providing confirming support for the
      Jehovah's Witnesses created-order reading.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.genesis.49_3.prototokos_birth_order
    evidence_id: evidence.lxx.ccat.genesis.49_3.reuben_firstborn
    method: lexical
    summary: >
      Genesis 49:3 in the Septuagint applies prototokos language to Reuben as
      Jacob's firstborn, and is used as an example of ordinary birth-order
      usage.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.luke_2_7.prototokos_birth_order
    evidence_id: evidence.bibleforge.greek.prototokos.luke_2_7_colossians_1_15
    method: lexical
    summary: >
      Luke 2:7 uses a form of prototokos for Jesus as Mary's firstborn child,
      and is used as an example of ordinary birth-order usage of the term.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.luke_2_7.firstborn_child_law_context
    evidence_id: evidence.jw_study_bible.colossians.1_15.mary_firstborn_law
    related_evidence_ids:
      - evidence.nwt.luke.2_7.mary_firstborn_child
      - evidence.nwt.luke.2_23.firstborn_male_holy
    method: contextual
    summary: >
      Luke 2:7 and the temple-presentation context are read as a concrete
      firstborn-child usage, supporting the ordinary birth-order sense of
      firstborn in the Jehovah's Witnesses response.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.jw.nt_prototokos.six_of_eight_jesus_occurrences
    evidence_id: evidence.jw_study_bible.colossians.1_15.six_of_eight_jesus
    method: lexical_distribution
    summary: >
      The Study Bible note's count claim is used as cumulative support that
      Christian Greek Scripture usage of prototokos, especially in references
      to Jesus, favors retaining the usual temporal sense in Colossians 1:15.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15

  - id: interpretation.methodology.bibleforge.nt_g4416_count_source_sensitive
    evidence_id: evidence.bibleforge.greek.prototokos.nt_g4416_occurrences
    method: source_comparison
    summary: >
      BibleForgeDB returns nine New Testament rows tagged G4416, including
      Matthew 1:25, so occurrence-count arguments about prototokos should name
      the textual source or database being counted.
    provenance:
      work:
        title: "Dataset author synthesis"

  - id: interpretation.nicene.colossians.1_15.firstborn_preeminence
    evidence_id: evidence.bsb.colossians.1_15.firstborn
    method: lexical
    summary: >
      The phrase firstborn over all creation is read as indicating rank or
      preeminence rather than created status.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        source_id: source.creed.nicene.trinitarian_summary

  - id: interpretation.trinitarian.psalms.89_27.firstborn_rank
    evidence_id: evidence.nwt.psalms.89_27.firstborn_highest
    method: contextual
    summary: >
      Psalm 89:27 applies firstborn language to the Davidic king in parallel
      with being highest of the kings of the earth, so firstborn is read here
      as rank or preeminence rather than mere birth order.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis"
