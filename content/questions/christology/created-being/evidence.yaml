  - id: evidence.lxx.ccat.genesis.49_3.reuben_firstborn
    source_id: source.greek.lxx.ccat_morph
    locator:
      type: verse
      value: "Genesis 49:3"
    quotation: "*ROUBHN PRWTO/TOKO/S MOU SU/"
    paraphrase: "Reuben, you are my firstborn."

  - id: evidence.bibleforge.greek.prototokos.luke_2_7_colossians_1_15
    source_id: source.bibleforge.original_language_db
    locator:
      type: lexical_verse_comparison
      value: "Luke 2:7; Colossians 1:15"
    quotation: >
      Luke 2:7: πρωτότοκον (G4416); Colossians 1:15: πρωτότοκος (G4416)
    paraphrase: >
      BibleForgeDB tags both Luke 2:7 and Colossians 1:15 with the same Greek
      Strong's number, G4416.

  - id: evidence.bibleforge.greek.romans.8_29.prototokos
    source_id: source.bibleforge.original_language_db
    locator:
      type: verse_word
      value: "Romans 8:29"
    quotation: "πρωτότοκον (G4416)"
    paraphrase: >
      BibleForgeDB tags the Romans 8:29 form πρωτότοκον with Strong's G4416.

  - id: evidence.bibleforge.greek.revelation.1_5.prototokos
    source_id: source.bibleforge.original_language_db
    locator:
      type: verse_word
      value: "Revelation 1:5"
    quotation: "πρωτότοκος (G4416)"
    paraphrase: >
      BibleForgeDB tags the Revelation 1:5 form πρωτότοκος with Strong's G4416.

  - id: evidence.bibleforge.greek.prototokos.nt_g4416_occurrences
    source_id: source.bibleforge.original_language_db
    locator:
      type: query_result
      value: "bible_original New Testament rows where strongs = 4416"
    paraphrase: >
      A local query of BibleForgeDB returns nine New Testament rows tagged
      Strong's G4416: Matthew 1:25; Luke 2:7; Romans 8:29; Colossians 1:15;
      Colossians 1:18; Hebrews 1:6; Hebrews 11:28; Hebrews 12:23; Revelation
      1:5.

  - id: evidence.jw_study_bible.colossians.1_15.no_basis_other_meaning
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: >
      there is no basis for the assertion that the term "firstborn" here takes
      on a meaning other than its usual one

  - id: evidence.jw_study_bible.colossians.1_15.usual_scriptural_meaning
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: >
      The usual Scriptural meaning of the term "firstborn" is the one born first
      in order of time

  - id: evidence.jw_study_bible.colossians.1_15.six_of_eight_jesus
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: >
      Six of the eight occurrences of the Greek term for "firstborn"
      (pro·toʹto·kos) in the Christian Greek Scriptures refer to Jesus.

  - id: evidence.jw_study_bible.colossians.1_15.mary_firstborn_law
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: >
      Because Jesus was "the firstborn" child of Mary, he was presented at the
      temple in accordance with Jehovah's Law.

  - id: evidence.jw_study_bible.colossians.1_15.first_creation_gloss
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: "That is, the first creation by Jehovah God."

  - id: evidence.jw_study_bible.colossians.1_15.preeminent_other_creatures
    source_id: source.publication.jw.study_bible.colossians_1_15
    locator:
      type: study_note
      value: "Colossians 1:15, note on 'the firstborn of all creation'"
    quotation: "Jesus is preeminent in relation to all other creatures"
