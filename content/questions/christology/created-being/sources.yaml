schema_version: "0.1"

kind: source

sources:
  - id: source.bible
    type: scripture
    title: "Bible"

  - id: source.bible.bsb
    type: translation
    title: "Berean Standard Bible"
    short_label: "BSB"
    work_id: source.bible
    rights:
      status: copyrighted
      attribution: "Berean Standard Bible"
      url: https://bereanbible.com/

  - id: source.bible.nwt_2013
    type: translation
    title: "New World Translation of the Holy Scriptures (2013 Revision)"
    short_label: "NWT 2013"
    work_id: source.bible
    author: "WATCHTOWER"
    language: en
    edition: "2013 revision / nwt-E EPUB"
    rights:
      status: copyrighted
      attribution: >
        New World Translation of the Holy Scriptures (2013 Revision),
        Watchtower Bible and Tract Society of New York, Inc.
    description: >
      2013 revision New World Translation EPUB used as a local reference source
      for Jehovah's Witnesses Scripture evidence. The local nwt-E EPUB metadata
      identifies WATCHTOWER as creator and Watchtower Bible and Tract Society
      of New York, Inc. as publisher.

  - id: source.bible.nwt_1984_reference
    type: translation
    title: "New World Translation of the Holy Scriptures—With References"
    short_label: "NWT 1984"
    url: https://wol.jw.org/en/wol/d/r1/lp-e/1001060001
    accessed: 2026-06-22
    work_id: source.bible
    author: "WATCHTOWER"
    language: en
    edition: "1984 revised edition / bi12-E"
    rights:
      status: copyrighted
      attribution: >
        New World Translation of the Holy Scriptures—With References,
        Watchtower Bible and Tract Society of New York, Inc.
    description: >
      1984 reference edition of the New World Translation. A local bi12-E EPUB
      is kept under archive/ for reference, and Watchtower Online Library is
      used for the introduction and verse footnote evidence.

  - id: source.greek.lxx.ccat_morph
    type: morphological_text
    title: "CCAT Morphologically Analyzed Septuagint"
    url: https://ccat.sas.upenn.edu/gopher/text/religion/biblical/lxxmorph/
    accessed: 2026-06-22
    language: grc
    rights:
      status: restricted
      attribution: "CCAT/CATSS Morphologically Analyzed Septuagint"
      url: https://ccat.sas.upenn.edu/gopher/text/religion/biblical/lxxmorph/0-user-declaration.txt
    description: >
      CCAT/CATSS morphologically analyzed Septuagint files used as a concrete
      Greek reference source. The local reference files are in CCAT Beta Code,
      and the CCAT analysis notes describe the text field as following Rahlfs'
      text.

  - id: source.bibleforge.original_language_db
    type: database
    title: "BibleForgeDB Original-Language Bible Data"
    url: https://github.com/bibleforge/BibleForgeDB
    accessed: 2026-06-22
    rights:
      status: public_domain
      attribution: "BibleForgeDB"
      url: https://github.com/bibleforge/BibleForgeDB/tree/master/licenses
    description: >
      Local reference clone of BibleForgeDB used for public-domain
      original-language Bible words, Strong's numbers, morphology, word order,
      and Greek/Hebrew lexicon data. The local clone is kept under archive/ and
      is not distributed with the catalog.

  - id: source.publication.jw.official_christology_summary
    type: web_page
    title: "Official Jehovah's Witnesses Christology Summary"
    rights:
      status: unknown
    description: >
      Provisional source record for an official or representative Jehovah's
      Witnesses publication used to attribute the created-being position. Before
      publication, replace or refine this with a concrete title, URL, access
      date, and locator.

  - id: source.publication.jw.study_bible.colossians_1_15
    type: study_note
    title: "New World Translation Study Bible Note on Colossians 1:15"
    url: https://www.jw.org/en/library/bible/study-bible/books/colossians/1/#v51001015
    accessed: 2026-06-22
    rights:
      status: copyrighted
      attribution: "New World Translation Study Bible, jw.org"
    description: >
      JW.org study note on Colossians 1:15, captured as a dated web source
      because study notes may change over time.

  - id: source.creed.nicene.trinitarian_summary
    type: creed
    title: "Nicene Creed"
    date: 325
    rights:
      status: unknown
    description: >
      Provisional source record for the Nicene attribution source used to
      represent the uncreated Son position. Before publication, replace or
      refine this with a concrete edition, translation, URL, and locator.
