schema_version: "0.1"

kind: argument

arguments:
  - id: argument.trinitarian.firstborn_not_necessarily_created
    role: objection
    summary: >
      Since Psalm 89:27 can use firstborn in a rank or preeminence sense,
      Colossians 1:15's use of firstborn does not by itself establish that
      Jesus is created.

  - id: argument.trinitarian.john_1_3_created_things_response
    role: response
    summary: >
      A Trinitarian response uses John 1:3, read through John 1:14, to argue
      that Jesus is not among the things that came into existence. This supplies
      a contextual and theological basis for resisting the created-order reading
      of firstborn in Colossians 1:15.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis using NWT John 1:3 and John 1:14"

  - id: argument.jw.colossians_1_16_all_other_things_response
    role: response
    summary: >
      A Jehovah's Witnesses response appeals to the NWT rendering of Colossians
      1:16-20, where all things language around Jesus is rendered as all other
      things. This answers the Trinitarian John 1:3 argument by treating Jesus
      as excluded from the things created through him.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.bible.nwt_2013

  - id: argument.trinitarian.nwt_1984_bracketed_other_response
    role: response
    summary: >
      A Trinitarian response appeals to the 1984 reference edition's bracketed
      "All [other]" evidence and bracket convention to argue that other is a
      supplied English word, so the NWT all-other-things wording should not be
      treated as independent proof of the Jehovah's Witnesses scope reading.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.nicene_trinitarian
      work:
        title: "Dataset author synthesis using NWT 1984 reference materials"

  - id: argument.jw.firstborn_usual_meaning_response
    role: response
    summary: >
      The Jehovah's Witnesses Study Bible response argues that firstborn in
      Colossians 1:15 should retain its usual temporal sense, so the
      rank-or-preeminence objection does not overturn the created-order reading.
    provenance:
      attributed_to:
        type: tradition
        id: tradition.jehovahs_witnesses
      work:
        source_id: source.publication.jw.study_bible.colossians_1_15
