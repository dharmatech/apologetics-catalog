name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  UV_PYTHON: "3.13"

jobs:
  build:
    name: Build static browser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Validate catalog
        run: uv run apologetics-catalog validate

      - name: Run tests
        run: uv run pytest

      - name: Build static site
        run: uv run apologetics-catalog build-web --output site

      - name: Verify static site
        run: |
          test -f site/index.html
          test -f site/catalog.json
          test -f site/app.js
          test -f site/style.css

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    name: Deploy static browser
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
